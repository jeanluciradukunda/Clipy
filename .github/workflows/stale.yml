name: Stale Issues

on:
  schedule:
    - cron: '0 0 * * 1'  # Every Monday
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: 'This issue has been inactive for 60 days. It will be closed in 14 days if there is no further activity.'
          stale-pr-message: 'This PR has been inactive for 30 days. It will be closed in 14 days if there is no further activity.'
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-issue-close: 14
          days-before-pr-close: 14
          exempt-issue-labels: 'security,bug'
          exempt-pr-labels: 'security'
