name: Release

on:
  # Triggered automatically when you create a tag via GitHub UI (Releases → Draft new release)
  push:
    tags:
      - 'v*'

  # Or trigger manually from Actions tab → Release → Run workflow
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 2.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    environment: production
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "TAG=v${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
            echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Create tag (if manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: git tag "v${{ inputs.version }}"
        # Tag is created locally for the release action — NOT pushed
        # to avoid triggering a duplicate run via the push:tags trigger

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: ${{ runner.os }}-pods-

      - name: Install CocoaPods
        run: |
          gem install cocoapods
          pod install

      - name: Set version in Info.plist
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.VERSION }}" "Clipy/Supporting Files/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.VERSION }}" "Clipy/Supporting Files/Info.plist"

      # ---------- Code Signing Setup ----------
      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          # Decode certificate
          CERTIFICATE_PATH=${{ runner.temp }}/certificate.p12
          printf '%s' "$CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"

          # Create temporary keychain
          KEYCHAIN_PATH=${{ runner.temp }}/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate and private key as an identity
          security import "$CERTIFICATE_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t agg \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      # ---------- Build & Sign ----------
      - name: Archive
        run: |
          xcodebuild \
            -workspace Clipy.xcworkspace \
            -scheme Clipy \
            -configuration Release \
            -archivePath ${{ runner.temp }}/Clipy.xcarchive \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_STYLE=Manual \
            OTHER_CODE_SIGN_FLAGS="--options runtime" \
            archive

      - name: Export app
        run: |
          mkdir -p ${{ runner.temp }}/export
          cp -R "${{ runner.temp }}/Clipy.xcarchive/Products/Applications/Clipy.app" \
            "${{ runner.temp }}/export/Clipy.app"

      - name: Re-sign embedded frameworks and app
        run: |
          APP_PATH="${{ runner.temp }}/export/Clipy.app"

          # Sign all embedded frameworks with hardened runtime
          find "$APP_PATH/Contents/Frameworks" -name "*.framework" -type d 2>/dev/null | while read fw; do
            codesign --force --deep --options runtime \
              --sign "Developer ID Application" "$fw"
          done

          # Sign any embedded dylibs
          find "$APP_PATH" -name "*.dylib" -type f 2>/dev/null | while read lib; do
            codesign --force --options runtime \
              --sign "Developer ID Application" "$lib"
          done

          # Re-sign the main app bundle (must be last)
          codesign --force --deep --options runtime \
            --sign "Developer ID Application" "$APP_PATH"

      - name: Verify signature
        run: |
          codesign --verify --deep --strict --verbose=2 "${{ runner.temp }}/export/Clipy.app"
          echo "✅ Code signature verified"

      # ---------- Notarization ----------
      - name: Create DMG
        run: |
          brew install create-dmg || true
          create-dmg \
            --volname "Clipy ${{ steps.version.outputs.VERSION }}" \
            --volicon "${{ runner.temp }}/export/Clipy.app/Contents/Resources/AppIcon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Clipy.app" 150 190 \
            --app-drop-link 450 190 \
            --hide-extension "Clipy.app" \
            "${{ runner.temp }}/Clipy-${{ steps.version.outputs.VERSION }}.dmg" \
            "${{ runner.temp }}/export/" || true

          # Fallback to hdiutil if create-dmg fails
          if [ ! -f "${{ runner.temp }}/Clipy-${{ steps.version.outputs.VERSION }}.dmg" ]; then
            hdiutil create \
              -volname "Clipy ${{ steps.version.outputs.VERSION }}" \
              -srcfolder "${{ runner.temp }}/export/" \
              -ov -format UDZO \
              "${{ runner.temp }}/Clipy-${{ steps.version.outputs.VERSION }}.dmg"
          fi

      - name: Sign DMG
        run: |
          codesign --force --sign "Developer ID Application" \
            "${{ runner.temp }}/Clipy-${{ steps.version.outputs.VERSION }}.dmg"
          echo "✅ DMG signed"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_PATH="${{ runner.temp }}/Clipy-${{ steps.version.outputs.VERSION }}.dmg"

          echo "Submitting for notarization..."
          SUBMIT_OUTPUT=$(xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1) || true

          echo "$SUBMIT_OUTPUT"

          # Extract submission ID
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')

          # Check if notarization succeeded
          if echo "$SUBMIT_OUTPUT" | grep -q "status: Accepted"; then
            echo "✅ Notarization accepted"
          else
            echo "❌ Notarization failed — fetching log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              developer_log.json 2>&1 || true
            cat developer_log.json 2>/dev/null || true
            exit 1
          fi

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$DMG_PATH"

          echo "✅ Notarization complete"

      # ---------- Cleanup & Release ----------
      - name: Clean up keychain
        if: always()
        run: security delete-keychain ${{ runner.temp }}/signing.keychain-db 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Clipy v${{ steps.version.outputs.VERSION }}
          body: |
            ## Clipy v${{ steps.version.outputs.VERSION }}

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ### Install
            1. Download `Clipy-${{ steps.version.outputs.VERSION }}.dmg` below
            2. Open the DMG and drag Clipy to Applications
            3. Launch Clipy — it appears in your menu bar

            **Signed and notarized with Apple Developer ID.** Requires macOS 14.0 Sonoma or later.
          files: |
            ${{ runner.temp }}/Clipy-${{ steps.version.outputs.VERSION }}.dmg
          draft: false
          prerelease: false
